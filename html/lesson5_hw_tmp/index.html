<!DOCTYPE html>
<html lang="ru">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Video Conference Layout</title>
   <link rel="stylesheet" href="./style.css">
</head>
<style>
   /* 1. Базовые сбросы и темная тема */
   body,
   html {
      margin: 0;
      padding: 0;
      /* Убираем стандартные отступы браузера по краям */
      height: 100%;
      /* Растягиваем страницу на всю высоту окна */
      font-family: "Segoe UI", Tahoma, sans-serif;
      /* Устанавливаем шрифт как в Windows/Teams */
      background-color: #000;
      /* Черный фон страницы */
      color: white;
      /* Белый цвет текста по умолчанию */
      overflow: hidden;
      /* Запрещаем общую прокрутку страницы (скролл будет только внутри блоков) */
   }

   /* 2. Главный контейнер (Flexbox) */
   .app-container {
      display: flex;
      /* Включает Flexbox: сайдбар и контент встают в ряд */
      height: 100vh;
      /* Высота контейнера ровно 100% видимой области экрана */
   }

   /* 3. Боковая панель (Sidebar) */
   .sidebar {
      width: 110px;
      /* Фиксированная ширина левой панели */
      background-color: #121212;
      /* Темно-серый фон */
      display: flex;
      flex-direction: column;
      /* Иконки и текст встают друг под друга (в столбик) */
      align-items: center;
      /* Центрируем содержимое по горизонтали */
      padding-top: 20px;
      /* Отступ сверху для первой иконки */
      gap: 20px;
      /* Расстояние между элементами меню */
      border-right: 1px solid #222;
      /* Тонкая линия-разделитель справа */
      font-size: 10px;
      /* Размер текста подписей */
      text-align: center;
      /* Текст внутри выравнивается по центру */
      overflow-wrap: break-word;
      /* Если слово длиннее 100px, оно принудительно перенесется */
   }

   .sidebar span,
   .sidebar div {
      min-width: 50px;
      max-width: 90%;
      /* Чтобы текст не прилипал к краям */
      line-height: 1.2;
      /* Чтобы строки не слипались */
   }

   .side-icon {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #888;
      /* font-size: 20px; */
   }

   .side-icon:hover {
      color: #fff;
   }

   /* 4. Основная область контента */
   .main-content {
      flex-grow: 1;
      /* Занимает всё свободное место справа от сайдбара */
      display: flex;
      flex-direction: column;
      /* Тулбар и видео-сетка встают друг под друга */
      min-width: 0;
      /* Критично: позволяет контенту сжиматься, запуская перенос карточек */
      overflow: hidden;
      /* Чтобы ничего не "вываливалось" за пределы области */
   }

   /* 5. Верхняя панель (Toolbar) */
   .toolbar {
      height: 60px;
      /* Фиксированная высота панели управления */
      background-color: #1a1a1a;
      display: flex;
      justify-content: space-between;
      /* Группы кнопок по краям */
      align-items: center;
      /* Центрирует кнопки по вертикали внутри панели */
      padding: 0 20px;
      /* Отступы от краев панели */
      border-bottom: 1px solid #333;
   }

   .tool-group {
      display: flex;
      gap: 15px;
      align-items: center;
   }

   .btn {
      background: #2b2b2b;
      border: none;
      color: white;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      /* text-overflow: ellipsis; */
      /* white-space: nowrap; */
      /* overflow: hidden;  */
   }

   .btn-danger {
      background: #c42b1c;
   }

   /* Кнопка выхода */

   /* 6. Сетка видео (Flexbox Grid) */
   .video-grid {
      flex-grow: 1;
      /* Занимает всё место под тулбаром */
      display: flex;
      padding: 20px;
      flex-wrap: wrap;
      /* ГЛАВНОЕ: позволяет карточкам перескакивать на новый ряд */
      gap: 15px;
      padding: 20px;
      justify-content: center;
      /* Центрирует карточки в ряду */
      align-content: flex-start;
      /* Если рядов много, они прижимаются к верху экрана */
      overflow-y: auto;
      /* Если людей очень много, появится вертикальный скролл */
   }

   /* 7. Карточка участника */
   .user-card {
      flex: 1 1 250px;
      /* Базовый размер 250px. Карточка может расти и сжиматься */
      max-width: 450px;
      /* Чтобы лицо не растягивалось на пол-экрана, если человек один */
      aspect-ratio: 16 / 9;
      /* Сохраняет пропорции киноэкрана (не дает карточке стать квадратом) */
      background-color: #2b2b2b;
      /* Цвет фона "заглушки", если нет видео */
      border-radius: 8px;
      /* Скругление углов */
      display: flex;
      align-items: center;
      /* Центрует аватар по вертикали */
      justify-content: center;
      /* Центрует аватар по горизонтали */
      position: relative;
      /* Нужно, чтобы имя (absolute) приклеилось к углу карточки */
   }

   .avatar {
      width: 80px;
      height: 80px;
      /* Размер кружка аватара */
      background: #444;
      border-radius: 50%;
      /* Делает блок идеально круглым */
      display: flex;
      /* Центрует буквы внутри круга */
      align-items: center;
      /*  Центрует буквы внутри круга */
      justify-content: center;
      /* Центрует буквы внутри круга */
      font-size: 24px;
      font-weight: bold;
   }

   .user-name {
      position: absolute;
      /* Позволяет наложить имя поверх картинки */
      bottom: 10px;
      /*  -  Прижимает имя в левый нижний угол  */

      left: 10px;
      /*  -  Прижимает имя в левый нижний угол  */
      font-size: 12px;
      background: rgba(0, 0, 0, 0.6);
      /* Полупрозрачный черный фон для читаемости на любом фоне */
      padding: 2px 8px;
      /* Внутренние отступы плашки с именем */
      border-radius: 4px;
   }

   /* Класс для активного спикера */
   .user-card:hover:active {
      box-shadow: inset 0 0 0 3px #4485f4;
      /* Синяя рамка внутри карточки */
      background-color: rgba(53, 53, 53, 1);
      /* Чуть более светлый фон */
   }

   /* Опционально: значок микрофона в углу карточки */
   .user-card:hover:active::after {
      content: "🎤";
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 14px;
      background: #4485f4;
      padding: 4px;
      border-radius: 50%;
   }
</style>

<body>

   <div class="app-container">
      <!-- Боковое меню -->
      <aside class="sidebar">
         <div class="side-icon">Действия</div>
         <div class="side-icon">Чат</div>
         <div class="side-icon">Команды</div>
         <div class="side-icon">Задания</div>
         <div class="side-icon">Календарь</div>
         <div class="side-icon">Звонки</div>
         <div class="side-icon">OneDrive</div>
         <div class="side-icon">Coplot</div>
         <div class="side-icon">...</div>
         <div class="side-icon">Приложения</div>
      </aside>

      <div class="main-content">
         <!-- Верхние кнопки -->
         <header class="toolbar">
            <div class="tool-group">
               <button class="btn">Чат</button>
               <button class="btn">Участники</button>
               <button class="btn">Поднять руку</button>
               <button class="btn">Реагировать</button>
               <button class="btn">Вид</button>
               <button class="btn">...</button>
            </div>
            <div class="tool-group">
               <button class="btn">Камера</button>
               <button class="btn">Микрофон</button>
               <button class="btn">Поделиться</button>
               <button class="btn btn-danger">Выйти</button>
            </div>
         </header>

         <!-- Сетка с видео -->
         <main class="video-grid">
            <div class="user-card active">
               <div class="avatar">AA</div>
               <div class="user-name">User Name #1</div>
            </div>
            <div class="user-card">
               <div class="avatar">BB</div>
               <div class="user-name">User Name #2</div>
            </div>
            <div class="user-card">
               <div class="avatar">CC</div>
               <div class="user-name">User Name #3</div>
            </div>
            <div class="user-card">
               <div class="avatar">DD</div>
               <div class="user-name">User Name #4</div>
            </div>
            <div class="user-card">
               <div class="avatar">EE</div>
               <div class="user-name">User Name #5</div>
            </div>
            <div class="user-card">
               <div class="avatar">FF</div>
               <div class="user-name">User Name #6</div>
            </div>
         </main>
      </div>
   </div>

</body>

</html>
