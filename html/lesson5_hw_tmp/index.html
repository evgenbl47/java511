<!DOCTYPE html>
<html lang="ru">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Video Conference Layout</title>
   <link rel="stylesheet" href="./style.css">
</head>

<body>

   <div class="app-container">
      <!-- Боковое меню -->
      <aside class="sidebar">
         <div class="side-icon">Действия</div>
         <div class="side-icon">Чат</div>
         <div class="side-icon">Команды</div>
         <div class="side-icon">Задания</div>
         <div class="side-icon">Календарь</div>
         <div class="side-icon">Звонки</div>
         <div class="side-icon">OneDrive</div>
         <div class="side-icon">Coplot</div>
         <div class="side-icon">...</div>
         <div class="side-icon">Приложения</div>
      </aside>

      <div class="main-content">
         <!-- Верхние кнопки -->
         <header class="toolbar">
            <div class="tool-group">
               <button class="btn">Чат</button>
               <button class="btn">Участники</button>
               <button class="btn">Поднять руку</button>
               <button class="btn">Реагировать</button>
               <button class="btn">Вид</button>
               <button class="btn">...</button>
            </div>
            <div class="tool-group">
               <button class="btn">Камера</button>
               <button class="btn">Микрофон</button>
               <button class="btn">Поделиться</button>
               <button class="btn btn-danger">Выйти</button>
            </div>
         </header>

         <!-- Сетка с видео -->
         <main class="video-grid">
            <div class="user-card active">
               <div class="avatar">AA</div>
               <div class="user-name">User Name #1</div>
            </div>
            <div class="user-card">
               <div class="avatar">BB</div>
               <div class="user-name">User Name #2</div>
            </div>
            <div class="user-card">
               <div class="avatar">CC</div>
               <div class="user-name">User Name #3</div>
            </div>
            <div class="user-card">
               <div class="avatar">DD</div>
               <div class="user-name">User Name #4</div>
            </div>
            <div class="user-card">
               <div class="avatar">EE</div>
               <div class="user-name">User Name #5</div>
            </div>
            <div class="user-card">
               <div class="avatar">FF</div>
               <div class="user-name">User Name #6</div>
            </div>
         </main>
      </div>
   </div>

</body>

</html>
