<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Diary - Settings</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <!-- Наш CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="styleSettings.css">
</head>
<body>

    <!-- Навигация -->
    <nav class="navbar">
        <div class="container-fluid">
            <div class="nav-left d-flex align-items-center">
                <a class="navbar-brand" href="#">
                    <img src="./images/logo.png" alt="logo" class="logo-img">
                </a>
                <div class="nav-links">
                    <a class="nav-link" href="./index.html">Home</a>
                    <a class="nav-link" href="./homework.html">Homework</a>
                    <!-- Активный пункт теперь Settings -->
                    <a class="nav-link active" href="#">Settings</a>
                </div>
            </div>
            <div class="nav-right">
                <img src="./images/user.png" alt="Profile" class="profile-img">
            </div>
        </div>
    </nav>

    <div class="container main-content">
        <!-- Заголовок -->
        <h2 class="page-title">Settings</h2>

        <!-- Вкладки -->
        <div class="settings-tabs">
            <div class="tab-item active">AVATAR</div>
            <div class="tab-item">STUDENT'S INFO</div>
            <div class="tab-item">CHANGE PASSWORD</div>
        </div>

        <!-- Основной контент -->
        <div class="row mt-4">
            <!-- Блок 1: Аватар -->
            <div class="col-md-3 text-center">
                <!-- ВСТАВЬ СЮДА ПУТЬ К БОЛЬШОЙ АВАТАРКЕ -->
                <img src="./images/user.png" alt="User Avatar" class="settings-avatar">
                <button class="btn-settings mt-3">Choose photo</button>
            </div>

            <!-- Блок 2: Личные данные -->
            <div class="col-md-5">
                <div class="mb-3"><input type="text" class="form-control settings-input" placeholder="First name"></div>
                <div class="mb-3"><input type="text" class="form-control settings-input" placeholder="Last name"></div>
                <div class="mb-3"><input type="email" class="form-control settings-input" placeholder="Email"></div>
                <div class="mb-3"><input type="tel" class="form-control settings-input" placeholder="Phone number"></div>
                <div class="mb-3"><input type="text" class="form-control settings-input" placeholder="Address"></div>
                <div class="mb-3"><input type="text" class="form-control settings-input" placeholder="FB link"></div>
                <button class="btn-settings w-100">Save changes</button>
            </div>

            <!-- Блок 3: Смена пароля -->
            <div class="col-md-4">
                <div class="mb-3"><input type="password" class="form-control settings-input" placeholder="Old password"></div>
                <div class="mb-3"><input type="password" class="form-control settings-input" placeholder="New password"></div>
                <div class="mb-3"><input type="password" class="form-control settings-input" placeholder="Repeat password"></div>
                <button class="btn-settings w-100">Change password</button>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
