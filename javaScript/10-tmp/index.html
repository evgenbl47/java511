<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026.05.26</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <h1>02:00:00</h1>
<!-- Start -->
    <div class="quiz-card card p-4">
        <div id="start-screen">
            <h2 class="mb-3">Math test</h2>
            <p>
                Total questions : <span id="total-count"></span>
            </p>
            <button id="start-btn" class="btn btn-primary">Test start</button>
        </div>
    </div>
    

    
    <!-- Questions -->
    <div id="quiz-screen" class="hidden">
        <p class="text-muted mb-2" id="progress"></p>
        <h4 id="question-text" class="mb-3"></h4>
        <div id="answers" class="answers mb-3"></div>
        <button id="next-btn" class="btn btn-success">Next</button>
    </div>



        <!-- Results -->
    <div id="result-screen" hidden class="hidden">
        <h3 id="queston-text" class="mb-3">Results : </h3>
        <p id="result-text" class="fs-4"></p>
        <div id="review"></div>
        <button id="restart-btn" class="btn btn-info">Start again</button>
    </div>

    <script src="./script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
